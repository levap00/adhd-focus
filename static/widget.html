<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>Focus Widget</title>
    <style>
        :root {
            --bg: #111827;
            --panel: #172033;
            --panel-soft: #1f2937;
            --line: rgba(148, 163, 184, 0.18);
            --text: #f9fafb;
            --muted: #9ca3af;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-width: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            min-height: 100dvh;
            padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
            overflow: hidden;
        }

        .widget {
            display: flex;
            width: 100%;
            min-height: 120px;
            flex: 1;
            gap: 8px;
        }

        .column {
            display: flex;
            min-width: 0;
            flex: 1 1 0;
            flex-direction: column;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
            overflow: hidden;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 32px;
            padding: 7px 9px 6px;
            border-bottom: 1px solid var(--line);
        }

        .title {
            min-width: 0;
            overflow: hidden;
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            line-height: 1.1;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            margin-left: 6px;
            border-radius: 999px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1;
        }

        .tasks {
            display: flex;
            min-height: 0;
            flex: 1;
            flex-direction: column;
            gap: 5px;
            padding: 7px;
            overflow: hidden;
        }

        .task {
            display: flex;
            min-width: 0;
            min-height: 22px;
            align-items: center;
            gap: 7px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.03);
            overflow: hidden;
        }

        .bar {
            width: 3px;
            align-self: stretch;
            flex: 0 0 3px;
            border-radius: 3px;
            background: var(--green);
        }

        .task.overdue .bar {
            background: var(--red);
        }

        .task-text {
            min-width: 0;
            padding: 4px 7px 4px 0;
            overflow: hidden;
            color: var(--text);
            font-size: 11px;
            font-weight: 650;
            letter-spacing: 0;
            line-height: 1.25;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time {
            color: var(--muted);
            font-weight: 800;
        }

        .empty,
        .message {
            display: flex;
            min-height: 44px;
            align-items: center;
            justify-content: center;
            padding: 8px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-align: center;
        }

        .message {
            position: fixed;
            inset: 0;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 300px) {
            body {
                padding: 6px;
            }

            .widget {
                gap: 6px;
            }

            .column-header {
                padding-inline: 7px;
            }

            .title {
                font-size: 11px;
            }

            .task-text {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <main id="widget" class="widget" aria-live="polite">
        <section class="column" aria-labelledby="today-title">
            <header class="column-header">
                <h1 id="today-title" class="title">Dzisiaj</h1>
                <span id="today-count" class="count">0</span>
            </header>
            <div id="today-list" class="tasks today"></div>
        </section>

        <section class="column" aria-labelledby="tomorrow-title">
            <header class="column-header">
                <h1 id="tomorrow-title" class="title">Jutro</h1>
                <span id="tomorrow-count" class="count">0</span>
            </header>
            <div id="tomorrow-list" class="tasks tomorrow"></div>
        </section>
    </main>

    <div id="message" class="message hidden"></div>

    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const token = (params.get("token") || "").trim();
            const widget = document.getElementById("widget");
            const message = document.getElementById("message");
            const todayList = document.getElementById("today-list");
            const tomorrowList = document.getElementById("tomorrow-list");
            const todayCount = document.getElementById("today-count");
            const tomorrowCount = document.getElementById("tomorrow-count");

            function showMessage(text) {
                widget.classList.add("hidden");
                message.textContent = text;
                message.classList.remove("hidden");
            }

            function setCount(el, value) {
                const count = Number(value || 0);
                el.textContent = String(count);
                el.style.color = count > 0 ? "var(--text)" : "var(--muted)";
            }

            function taskLabel(task) {
                const name = (task && task.name ? String(task.name) : "").trim() || "(bez nazwy)";
                const time = (task && task.time ? String(task.time) : "").trim();
                return time ? `${time} ${name}` : name;
            }

            function renderTasks(container, tasks) {
                container.replaceChildren();

                if (!Array.isArray(tasks) || tasks.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "empty";
                    empty.textContent = "Brak zadań";
                    container.appendChild(empty);
                    return;
                }

                for (const task of tasks) {
                    const row = document.createElement("div");
                    row.className = task && task.is_overdue ? "task overdue" : "task";

                    const bar = document.createElement("span");
                    bar.className = "bar";

                    const text = document.createElement("span");
                    text.className = "task-text";

                    const time = (task && task.time ? String(task.time) : "").trim();
                    if (time) {
                        const timeEl = document.createElement("span");
                        timeEl.className = "time";
                        timeEl.textContent = time;
                        text.appendChild(timeEl);
                        text.append(" ");
                    }
                    text.append((task && task.name ? String(task.name) : "").trim() || "(bez nazwy)");

                    row.title = taskLabel(task);
                    row.append(bar, text);
                    container.appendChild(row);
                }
            }

            async function loadWidget() {
                if (!token) {
                    showMessage("Brak tokenu");
                    return;
                }

                const url = `/tasks/widget/android?token=${encodeURIComponent(token)}`;
                try {
                    const response = await fetch(url, {
                        cache: "no-store",
                        credentials: "omit",
                        headers: { "Accept": "application/json" },
                    });

                    if (!response.ok) {
                        showMessage(response.status === 401 ? "Brak dostępu" : "Błąd pobierania");
                        return;
                    }

                    const data = await response.json();
                    renderTasks(todayList, data.today);
                    renderTasks(tomorrowList, data.tomorrow);
                    setCount(todayCount, data.counts && data.counts.today_total);
                    setCount(tomorrowCount, data.counts && data.counts.tomorrow_total);
                    message.classList.add("hidden");
                    widget.classList.remove("hidden");
                } catch (error) {
                    showMessage("Błąd pobierania");
                }
            }

            loadWidget();
            window.addEventListener("focus", loadWidget);
            document.addEventListener("visibilitychange", () => {
                if (!document.hidden) {
                    loadWidget();
                }
            });
        })();
    </script>
</body>
</html>
